<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Details | Rentam Nigeria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="rentam logo.jpeg" alt="Rentam Logo" height="40" class="rounded logo-shadow me-2">
                <span class="fw-bold" style="letter-spacing: -0.5px; color: var(--secondary-color);">Rentam</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center" id="navbar-links">
                    <li class="nav-item"><a class="nav-link px-3" href="listings.html">Find House</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="agent-register.html">Become an Agent</a></li>
                    <div id="auth-section" class="d-lg-flex align-items-center">
                        <li class="nav-item"><a class="nav-link px-3" href="login.html">Login</a></li>
                        <li class="nav-item"><a class="nav-link btn btn-primary text-white ms-lg-3" href="signup.html">Join Rentam</a></li>
                    </div>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5" id="details-container">
        <!-- Spinner while loading -->
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3">Fetching home details...</p>
        </div>
    </div>

    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p>&copy; 2026 Rentam Nigeria. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const propId = urlParams.get('id');
            const container = document.getElementById('details-container');

            if (!propId) {
                container.innerHTML = '<div class="alert alert-danger">Error: No property selected.</div>';
                return;
            }

            try {
                const response = await fetch(`/api/properties/${propId}`);
                let p = null;
                if (response.ok) {
                    p = await response.json();
                } else {
                    // Fallback to mocks
                    p = mockProperties.find(item => item.id == propId || item._id == propId);
                }

                if (!p) throw new Error("Not found");

                const image = p.image || (p.images && p.images[0]) || 'https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?w=1200';
                
                container.innerHTML = `
                <div class="row">
                    <div class="col-lg-8">
                        <div class="rounded-4 overflow-hidden mb-4 shadow">
                            <img src="${image}" class="img-fluid w-100" style="max-height: 500px; object-fit: cover;">
                        </div>
                        <h1 class="fw-bold">${p.title}</h1>
                        <p class="text-muted"><i class="fas fa-map-marker-alt text-primary me-2"></i> ${p.location}</p>
                        <hr>
                        <h4 class="fw-bold mb-3">Property Description</h4>
                        <p class="text-secondary" style="line-height: 1.8;">
                            ${p.description || "This verified property is listed by a trusted agent on Rentam. It offers great proximity to campus and features essential amenities for a comfortable stay."}
                        </p>
                        
                        <div class="d-flex gap-3 my-5">
                            <a href="https://wa.me/${p.agent?.phone || '2348000000000'}" class="btn btn-primary px-4 py-2 rounded-pill"><i class="fab fa-whatsapp me-2"></i> Chat with Agent</a>
                            <button class="btn btn-outline-secondary px-4 py-2 rounded-pill" onclick="toggleChat()"><i class="fas fa-robot me-2"></i> Ask AI Winner</button>
                        </div>
                    </div>
                    <div class="col-lg-4">
                        <div class="card p-4 border-0 shadow-sm sticky-top" style="top: 100px; border-radius: 20px;">
                            <h2 class="price-tag mb-3" style="font-size: 2.5rem;">₦${p.price?.toLocaleString() || 'N/A'}<small class="text-muted fs-6">/ yr</small></h2>
                            
                            <div class="alert alert-light border shadow-sm py-2 px-3 mb-4" style="font-size: 13px; border-left: 5px solid #FF7A00 !important;">
                                <i class="fas fa-shield-alt text-primary me-1"></i> <strong>Buyer Protection Enabled</strong><br>
                                Pay your 10% connection fee to Rentam to secure this home today.
                            </div>

                            <div class="mb-4">
                                <h6 class="fw-bold mb-3">Key Features</h6>
                                <ul class="list-unstyled">
                                    <li class="mb-2"><i class="fas fa-check-circle text-success me-2"></i> Secure Environment</li>
                                    <li class="mb-2"><i class="fas fa-check-circle text-success me-2"></i> Running Water</li>
                                    <li class="mb-2"><i class="fas fa-check-circle text-success me-2"></i> Verified Agent</li>
                                </ul>
                            </div>

                            <hr>
                            <div class="agent-info d-flex align-items-center mt-3">
                                <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 50px; height: 50px; font-size: 20px;">
                                    <i class="fas fa-user-tie"></i>
                                </div>
                                <div>
                                    <h6 class="mb-0 fw-bold">${p.agent?.name || 'Verified Agent'}</h6>
                                    <small class="text-muted">ID: #${(p._id || p.id).toString().slice(-6)}</small>
                                </div>
                            </div>
                            <a href="tel:${p.agent?.phone || '2348000000000'}" class="btn btn-outline-primary w-100 mt-4 rounded-pill">Call Agent Now</a>
                        </div>
                    </div>
                </div>`;

            } catch (err) {
                container.innerHTML = '<div class="alert alert-danger">Error: Could not load property details. Please try again.</div>';
            }
        });
    </script>
</body>
</html>
