<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up | Rentam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4 shadow-sm border-0">
                    <div class="text-center mb-3">
                        <a href="index.html" class="text-decoration-none d-inline-flex align-items-center">
                            <img src="rentam logo.jpeg" alt="Rentam Logo" height="50" class="rounded logo-shadow me-2">
                            <span class="fw-bold fs-3" style="letter-spacing: -0.5px; color: var(--secondary-color);">Rentam</span>
                        </a>
                    </div>
                    <h2 class="fw-bold text-center mb-4">Create Account</h2>
                    <form id="signupForm">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Role</label>
                            <select class="form-select">
                                <option value="user">Student / Renter</option>
                                <option value="agent">Property Agent</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">Create Account</button>
                    </form>
                    <p class="text-center mt-3">Already have an account? <a href="login.html">Login</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const role = document.querySelector('select.form-select').value;
            const name = document.querySelector('input[type="text"]').value;
            const email = document.querySelector('input[type="email"]').value;
            const password = document.querySelector('input[type="password"]').value;
            
            if (role === 'agent') {
                // Save basic info to process on the agent registration page
                localStorage.setItem('tempAgentName', name);
                localStorage.setItem('tempAgentEmail', email);
                localStorage.setItem('tempAgentPassword', password);
                alert("Agent Profile requires further Verification. Redirecting to Application Form...");
                window.location.href = 'agent-register.html';
            } else {
                try {
                    const response = await fetch('/api/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, email, password, role })
                    });
                    
                    const data = await response.json().catch(() => ({}));
                    
                    if (response.ok) {
                        alert("Account created successfully! Please proceed to login.");
                        window.location.href = 'login.html';
                    } else {
                        alert("Registration failed: " + (data.msg || data.message || "Internal server error."));
                    }
                } catch (err) {
                    console.error("Backend unavailable:", err);
                    alert("Network Error: Could not connect to the database. Please ensure you are viewing this via your live server or localhost:5000.");
                }
            }
        });
    </script>
</body>
</html>
