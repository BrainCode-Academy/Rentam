<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up | Rentam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4 shadow-sm border-0">
                    <div class="text-center mb-3">
                        <a href="index.html" class="text-decoration-none d-inline-flex align-items-center">
                            <img src="rentam logo.jpeg" alt="Rentam Logo" height="50" class="rounded logo-shadow me-2">
                            <span class="fw-bold fs-3" style="letter-spacing: -0.5px; color: var(--secondary-color);">Rentam</span>
                        </a>
                    </div>
                    <h2 class="fw-bold text-center mb-4">Create Account</h2>
                    <form id="signupForm">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Role</label>
                            <select class="form-select">
                                <option value="user">Student / Renter</option>
                                <option value="agent">Property Agent</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">Create Account</button>
                    </form>
                    <p class="text-center mt-3">Already have an account? <a href="login.html">Login</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
