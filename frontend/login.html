<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Rentam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card p-4 shadow-sm border-0">
                    <div class="text-center mb-3">
                        <a href="index.html" class="text-decoration-none d-inline-flex align-items-center">
                            <img src="rentam logo.jpeg" alt="Rentam Logo" height="50" class="rounded logo-shadow me-2">
                            <span class="fw-bold fs-3" style="letter-spacing: -0.5px; color: var(--secondary-color);">Rentam</span>
                        </a>
                    </div>
                    <h2 class="fw-bold text-center mb-4">Login</h2>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" id="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">Login</button>
                    </form>
                    <p class="text-center mt-3">Don't have an account? <a href="signup.html">Sign Up</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Login Authentication Script -->
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Stop page from refreshing
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();

                if (!response.ok) {
                    alert("Error: " + (data.msg || "Invalid credentials"));
                    return;
                }

                localStorage.setItem('rentamToken', data.token);
                localStorage.setItem('rentamRole', data.user.role);
                localStorage.setItem('rentamName', data.user.name);
                
                if(data.user.role === 'admin') {
                    alert('Welcome System Admin! Redirecting to dashboard...');
                    window.location.href = 'admin-dashboard.html';
                } else if (data.user.role === 'agent') {
                    alert('Welcome verified Agent! Redirecting to your listings...');
                    window.location.href = 'listings.html';
                } else {
                    alert('Welcome Buyer! Find your next home.');
                    window.location.href = 'index.html';
                }
            } catch (err) {
                console.error(err);
                alert("Server error during login.");
            }
        });
    </script>
</body>
</html>
