<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Houses | Rentam Nigeria</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="rentam logo.jpeg" alt="Rentam Logo" height="40" class="rounded logo-shadow me-2">
                <span class="fw-bold" style="letter-spacing: -0.5px; color: var(--secondary-color);">Rentam</span>
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link px-3 active" href="listings.html">Find House</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="agent-register.html">Become an Agent</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="login.html">Login</a></li>
                    <li class="nav-item"><a class="nav-link btn btn-primary text-white ms-lg-3" href="signup.html">Join Rentam</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row">
            <!-- Filters Sidebar -->
            <div class="col-lg-3 mb-4">
                <div class="card p-4">
                    <h5 class="fw-bold mb-3">Filters</h5>
                    <div class="mb-3">
                        <label class="form-label">Price Range (Max)</label>
                        <input type="range" class="form-range" id="priceRange" min="50000" max="1000000" step="10000" value="1000000">
                        <div class="d-flex justify-content-between small fw-bold">
                            <span>₦50,000</span>
                            <span id="priceDisplay">₦1,000,000</span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Location</label>
                        <!-- JavaScript will automatically inject the 50 Universities here -->
                        <div class="filter-location-list" style="max-height: 200px; overflow-y: auto; padding: 10px; border: 1px solid #eee; border-radius: 8px;">
                            <small class="text-muted">Loading locations...</small>
                        </div>
                    </div>
                    <button class="btn btn-primary w-100 mt-4" onclick="triggerFilter()">Apply Filters</button>
                </div>
            </div>

            <!-- Listings Grid -->
            <div class="col-lg-9">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="fw-bold">Available Properties</h3>
                    <select class="form-select w-auto">
                        <option>Newest First</option>
                        <option>Price: Low to High</option>
                        <option>Price: High to Low</option>
                    </select>
                </div>

                <div class="row g-4" id="listings-container">
                    <!-- Javascript will inject properties here automatically -->
                    <div class="col-12 text-center py-5">
                         <div class="spinner-border text-primary" role="status"></div>
                         <p class="mt-2 text-muted">Loading 100+ Properties...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- AI Assistant Component -->
    <div id="winner-chat-bubble" onclick="toggleChat()">
        <i class="fas fa-robot"></i>
        <span class="ms-2">AI Agent Winner</span>
    </div>
    <!-- Chat window should be same as index.html -->

    <script src="js/app.js"></script>
</body>
</html>
