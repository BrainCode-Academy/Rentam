<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Become an Agent | Rentam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4 shadow-sm">
                    <div class="text-center mb-3">
                        <a href="index.html" class="text-decoration-none d-inline-flex align-items-center">
                            <img src="rentam logo.jpeg" alt="Rentam Logo" height="50" class="rounded logo-shadow me-2">
                            <span class="fw-bold fs-3" style="letter-spacing: -0.5px; color: var(--secondary-color);">Rentam</span>
                        </a>
                    </div>
                    <h2 class="fw-bold text-center mb-4">Register as an Agent</h2>
                    <form id="agentRegForm">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" id="agentName" class="form-control" placeholder="Enter your full name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Business Name</label>
                            <input type="text" id="businessName" class="form-control" placeholder="Estate name or Personal Brand" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" id="agentEmail" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="tel" id="agentPhone" class="form-control" placeholder="+234..." required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Upload ID Card (NIN/Voter's/Driver's)</label>
                            <input type="file" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">Submit for Verification</button>
                    </form>
                    <p class="text-center mt-3"><a href="login.html" class="text-decoration-none">Already have an account? Login</a></p>
                </div>
            </div>
    </div>
    
    <!-- Global Logic -->
    <script src="js/app.js"></script>
    <script>
        const token = localStorage.getItem('rentamToken');

        // UI Adjustments if logged in
        if(token) {
            document.getElementById('agentName').closest('.mb-3').classList.add('d-none');
            document.getElementById('agentEmail').closest('.mb-3').classList.add('d-none');
            document.querySelector('.text-center.mt-3').classList.add('d-none');
            document.querySelector('h2').innerText = "Upgrade to Agent Account";
            
            // Set required false for hidden fields
            document.getElementById('agentName').required = false;
            document.getElementById('agentEmail').required = false;
        }

        // Auto-fill if redirected from signup
        if(localStorage.getItem('tempAgentName')) {
            document.getElementById('agentName').value = localStorage.getItem('tempAgentName');
            document.getElementById('agentEmail').value = localStorage.getItem('tempAgentEmail');
        }

        document.getElementById('agentRegForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const businessName = document.getElementById('businessName').value;
            const phone = document.getElementById('agentPhone').value;
            
            try {
                let url = '/api/register';
                let method = 'POST';
                let body = { 
                    name: document.getElementById('agentName').value,
                    email: document.getElementById('agentEmail').value,
                    password: localStorage.getItem('tempAgentPassword') || 'defaultPassword123',
                    role: 'agent',
                    agentProfile: { businessName, phone }
                };

                // If logged in, use the apply endpoint
                if (token) {
                    url = '/api/agents/apply';
                    method = 'PUT';
                    body = { businessName, phone };
                }

                const response = await fetch(url, {
                    method: method,
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': token ? `Bearer ${token}` : ''
                    },
                    body: JSON.stringify(body)
                });
                
                const data = await response.json().catch(() => ({}));

                if (response.ok) {
                    localStorage.removeItem('tempAgentName');
                    localStorage.removeItem('tempAgentEmail');
                    localStorage.removeItem('tempAgentPassword');
                    
                    if (token) {
                        alert("Application submitted! Your account is now being reviewed by our Admin.");
                        // Update local role
                        localStorage.setItem('rentamRole', 'agent');
                        window.location.href = 'agent-dashboard.html';
                    } else {
                        alert("Registration successful! Your application has been sent to our Admin. You can login once approved.");
                        window.location.href = 'login.html';
                    }
                } else {
                    alert("Submission failed: " + (data.msg || data.message || "Server Error"));
                }
            } catch (err) {
                console.error("Backend Error:", err);
                alert("Network Error: Could not reach the server.");
            }
        });
    </script>
</body>
</html>
